<!DOCTYPE html>
<html lang="en" class="overflow-hidden">
    <head>
        <link rel="stylesheet" href="../bin/msize.css">
        <link rel="stylesheet" href="./@styles.css">
        <title>Visual Magazine</title>
    </head>
    <body>
        <va-main>
            <div id="background-overlay">
                <va-body>
                    <div id="main" class="visual-layer" tabindex="1" close>
                        <div class="d-flex">
                            <div id="con-1">

                                    <div id="mag-posts">
                                        <div class="mag-post" prev> <div class="mag-description"> <div> <h2></h2> <span></span> </div> <div class="btab">Discover</div></div> </div>

                                    </div>
                                </va-mag-pic>
                            </div>
                            <div id="con-2">
                                <va-mag-con>
                                    <div id="mags">
                                        <div class="mag-con" prev> <div> <div class="mag-d"></div> <span class="o.3 px-xs cursor-pointer">read more</span> </div> <span id="author" class="w-fit py-lg o.7"></span> </div>

                                    </div>
                                </va-mag-con>
                            </div>
                        </div>
                    </div>

                        <div id="catalogues-handle">
                            <div>

                                        </div>
                                    </div>
                                    <div id="header">
                                        <div class="head">Catalogues</div>
                                        <h2>Discover our collection of articles</h2>
                                    </div>
                                    <section id="catalogues-block"></section>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="articles-view" class="visual-layer" open>
                        <div class="h-full px-xs">
                            <div class="d-flex justify-center h-full overflow-hidden y-auto">
                                <div class="max-w-content">
                                    <div id="mg-img" class="pos-relative w-full">
                                        <div class="pos-absolute"></div>
                                    </div>
                                    <div class="pt-lg d-flex justify-between">
                                        <div class="tags-container"></div>
                                        <div></div>
                                    </div>
                                    <div id="articles-block"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </va-body>
            </div>
        </va-main>
        <div id="content-onload" class="items-center justify-center d-none" data-state="invisible"></div>
    </body>
    <script src="./magposts.js"></script>
    <script src="./catalogues.js"></script>
    <script src="./$script.js"></script>
</html>
