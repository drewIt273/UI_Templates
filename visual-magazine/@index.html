<!DOCTYPE html>
<html lang="en" class="overflow-hidden">
    <head>
        <link rel="stylesheet" href="../bin/msize.css">
        <link rel="stylesheet" href="./@styles.css">
        <title>Visual Magazine</title>
    </head>
    <body>
        <va-main>
            <div id="background-overlay">
                <va-body>
                    <div id="main" tabindex="1" class="o-0" close>
                        <div id="con-1">
                            <va-mag-pic>
                                <div id="mag-posts">
                                    <div class="mag-post" prev> <div class="mag-description"> <div> <h2></h2> <span></span> </div> <div class="btab">Discover</div></div> </div>
                                    <div class="mag-post" now> <div class="mag-description"> <div> <h2></h2> <span></span> </div> <div class="btab">Discover</div></div> </div>
                                    <div class="mag-post" next> <div class="mag-description"> <div> <h2></h2> <span></span> </div> <div class="btab">Discover</div></div> </div>
                                </div>
                            </va-mag-pic>
                        </div>
                        <div id="con-2">
                            <va-mag-con>
                                <div id="mags">
                                    <div class="mag-con" prev> <div> <div class="mag-d"></div> <span class="o.3 px-xs cursor-pointer">read more</span> </div> <span id="author" class="w-fit py-lg o.7"></span> </div>
                                    <div class="mag-con" now> <div> <div class="mag-d"></div> <span class="o.3 px-xs cursor-pointer">read more</span> </div> <span id="author" class="w-fit py-lg o.7"></span> </div>
                                    <div class="mag-con" next> <div> <div class="mag-d"></div> <span class="o.3 px-xs cursor-pointer">read more</span> </div> <span id="author" class="w-fit py-lg o.7"></span> </div>
                                </div>
                            </va-mag-con>
                        </div>
                    </div>
                </va-body>
            </div>
            <div id="catalogue" class="center" open>
                <div class="containlogues"></div>
            </div>
        </va-main>
        <div id="content-onload" class="items-center justify-center d-none" data-state="invisible"></div>
    </body>
    <script src="./magposts.js"></script>
    <script src="./catalogues.js"></script>
    <script src="./$script.js"></script>
</html>
